<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>VirtualOS</title>
    <meta name="description" content="VirtualOS is an open-source web-based operating system inspired by Ubuntu Linux and Windows made with React.js by VirtualOS."/>

		<!-- Favicon -->
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7">
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=7">
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=7">
		<link rel="icon" href="/favicon.ico?v=7" sizes="any">
		<link rel="icon" href="/icon.svg?v=7" type="image/svg+xml">
		<link rel="icon" href="/icon.png?v=7" type="image/png">
		<link rel="manifest" href="/site.webmanifest?v=5">
		<meta name="apple-mobile-web-app-title" content="VirtualOS">
		<meta name="application-name" content="VirtualOS">
		<meta name="msapplication-TileColor" content="#0d1114">
		<meta name="theme-color" content="#4D9CFF">

    <!-- Open Graph -->
		<meta property="og:title" content="VirtualOS | Web-based Operating System"/>
		<meta property="og:site_name" content="VirtualOS"/>
		<meta property="og:description" content="VirtualOS is an open-source web-based operating system inspired by Ubuntu Linux and Windows made with React.js by NanoKim."/>
		<meta property="og:type" content="website"/>
		<meta property="og:locale" content="en_US">

    <!-- Fonts -->
		<link rel="preload" href="/assets/fonts/outfit/Outfit-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>
		<link rel="preload" href="/assets/fonts/roboto-mono/RobotoMono-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin>

    <!-- PWA -->
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="translucent-black">
		<script>
			// Change theme color to black if app is running as PWA
			const isPWA = (window.navigator.standalone === true) || (window.matchMedia("(display-mode: standalone)").matches)
			if (isPWA) {
				const themeColor = document.querySelector("meta[name='theme-color']");
				themeColor?.setAttribute("content", "#0D1114");
			}
		</script>

  </head>
  <body>
    <!-- <noscript>You need to enable JavaScript to run VirtualOS.</noscript> -->
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
